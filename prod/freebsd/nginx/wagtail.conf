upstream wagtail {
    server unix:/var/run/wagtail/wagtail.sock;
    keepalive 128;
}

proxy_cache_path /var/cache/nginx/wagtail
    keys_zone=wagtail_cache:32m
    max_size=256m
    inactive=60m
    use_temp_path=off;

server {
    listen 80;
    # listen [::]:80;
    server_name bsd.jsmx.org hanz.jsmx.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl backlog=8192;
    # listen [::]:443 ssl;
    http2 on;
    server_name bsd.jsmx.org hanz.jsmx.org;

    ssl_certificate     /usr/local/etc/ssl/cf-origin.pem;
    ssl_certificate_key /usr/local/etc/ssl/cf-origin.key;

    # upload protection
    client_max_body_size 16m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 15s;

    # security headers owned by Django middleware (SecurityMiddleware + XFrameOptionsMiddleware)
    # only X-Server-Cache is NGINX-specific
    add_header X-Server-Cache $upstream_cache_status;

    location /static/ {
        alias /usr/local/www/wagtail/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # location /media/ {
    #    alias /usr/local/www/wagtail/media/;
    #    expires 7d;
    #    add_header Cache-Control "public";
    #    access_log off;
    #    sendfile on;
    # }

    # optional: restrict admin to specific IP
    # location /admin/ {
    #     allow YOUR.IP.ADDRESS;
    #     deny all;
    # }

    location / {
        proxy_pass http://wagtail;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_buffer_size 16k;

        # cache configuration
        proxy_cache wagtail_cache;
        proxy_cache_valid 200 302 5m; # regular pages
        proxy_cache_valid 301 308 1h; # redirects rarely change
        proxy_cache_valid 403 404 30s; # errors
        proxy_cache_key "$host$request_uri";

        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;
        proxy_cache_lock_age 10s;

        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;

        # cache bypass for admin and authenticated users
        set $skip_cache 0;
        if ($request_uri ~* "^/(admin|django-admin)/") { set $skip_cache 1; }
        if ($cookie_sessionid) { set $skip_cache 1; }
        if ($http_authorization) { set $skip_cache 1; }

        proxy_cache_bypass $skip_cache;
        proxy_no_cache $skip_cache;
    }
}
